<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FIX Consulting - İhracat Raporu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4ff;min-height:100vh}
.header{background:linear-gradient(135deg,#1a3a8f,#2563eb);color:#fff;padding:20px 30px}
.header h1{font-size:1.5rem;font-weight:700}
.header p{font-size:.85rem;opacity:.8;margin-top:4px}
.steps{display:flex;gap:0;background:#fff;border-bottom:1px solid #e5e7eb;padding:0 30px;overflow-x:auto}
.step{padding:12px 20px;font-size:.8rem;color:#9ca3af;display:flex;align-items:center;gap:6px;white-space:nowrap;border-bottom:2px solid transparent}
.step.on{color:#2563eb;border-bottom-color:#2563eb;font-weight:600}
.step.done{color:#16a34a}
.step.err{color:#dc2626}
.main{max-width:700px;margin:40px auto;padding:0 20px}
.card{background:#fff;border-radius:16px;padding:36px;box-shadow:0 2px 16px rgba(0,0,0,.08)}
label{display:block;font-size:.8rem;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.hint{font-size:.75rem;color:#6b7280;margin-top:4px;margin-bottom:16px}
input[type=text]{width:100%;padding:12px 16px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.95rem;outline:none;transition:border .2s}
input[type=text]:focus{border-color:#2563eb}
.tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:8px 16px;border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;cursor:pointer;font-size:.82rem;color:#374151;transition:all .2s}
.tab.on{background:#2563eb;color:#fff;border-color:#2563eb}
.sep{height:1px;background:#f3f4f6;margin:24px 0}
button#btn{width:100%;padding:16px;background:linear-gradient(135deg,#1a3a8f,#2563eb);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:24px}
button#btn:disabled{opacity:.6;cursor:not-allowed}
#lb{display:none;margin-top:24px;background:#f8faff;border:1px solid #dbeafe;border-radius:12px;padding:16px}
#lb h3{font-size:.85rem;color:#1e40af;margin-bottom:10px}
#ll{max-height:200px;overflow-y:auto;font-size:.8rem;font-family:monospace}
.log-ok{color:#16a34a}.log-er{color:#dc2626}.log-inf{color:#374151}
#res{margin-top:24px}
.res-card{background:#fff;border:1px solid #d1fae5;border-radius:12px;padding:24px}
.res-card h2{color:#065f46;margin-bottom:16px}
.res-links{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.res-links a{padding:10px 20px;border-radius:8px;text-decoration:none;font-size:.85rem;font-weight:600}
.link-doc{background:#2563eb;color:#fff}
.link-folder{background:#e0f2fe;color:#0369a1}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat{background:#f0f9ff;border-radius:10px;padding:16px;text-align:center}
.stat-val{font-size:1.1rem;font-weight:700;color:#1e40af}
.stat-lbl{font-size:.72rem;color:#64748b;margin-top:4px;text-transform:uppercase}
table{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:10px}
th{background:#f1f5f9;padding:8px 12px;text-align:left;color:#475569;font-weight:600}
td{padding:8px 12px;border-bottom:1px solid #f1f5f9;color:#374151}
tr:hover td{background:#f8faff}
</style>
</head>
<body>
<div class="header">
  <h1>FIX Consulting — Otomatik İhracat Raporu</h1>
  <p>Firma Adı + Ürün/GTİP → AI Analiz → Drive</p>
</div>
<div class="steps">
  <div class="step" id="s0">🔍 GTİP</div>
  <div class="step" id="s1">📊 Pazar</div>
  <div class="step" id="s2">🤖 AI İçerik</div>
  <div class="step" id="s3">☁️ Kaydediliyor</div>
  <div class="step" id="s4">✅ Hazır</div>
</div>
<div class="main">
  <div class="card">
    <label>🏢 Müşteri / Firma Adı</label>
    <input type="text" id="firma" placeholder="örnek: Arçelik, CMK Kağıt, ABC Ltd...">
    <p class="hint">Dosya adı: <strong>FİRMA ADI - ON CALISMA</strong> olarak kaydedilir</p>
    <div class="sep"></div>
    <label>📦 Ürün Adı / 12 Haneli GTİP / Website</label>
    <div class="tabs">
      <button class="tab on" id="t-u" onclick="setTab('u')">🏭 Ürün Adı</button>
      <button class="tab" id="t-g" onclick="setTab('g')">🔢 GTİP (12 hane)</button>
      <button class="tab" id="t-w" onclick="setTab('w')">🌐 Web Sitesi</button>
    </div>
    <input type="text" id="inp" placeholder="dökme demir tava, çelik boru...">
    <button id="btn" onclick="run()">🚀 Raporu Otomatik Hazırla</button>
  </div>
  <div id="lb"><h3>⏳ İşlem Durumu</h3><div id="ll"></div></div>
  <div id="res"></div>
</div>
<script>
var FOLDER_URL='https://drive.google.com/drive/folders/1WaBrSm7Ey3WUq3K3foRITFiuKdzltwer';
var mode='u',running=false;
function setTab(m){mode=m;['u','g','w'].forEach(function(x){document.getElementById('t-'+x).className='tab'+(x===m?' on':'');});var ph={u:'dökme demir tava, çelik boru...',g:'480255901000 (12 haneli GTİP)',w:'www.firmam.com...'};document.getElementById('inp').placeholder=ph[m];}
function ss(n){for(var i=0;i<5;i++){var e=document.getElementById('s'+i);e.className='step'+(i<n?' done':i===n?' on':'');}}
function lg(msg,type){var d=document.createElement('div');d.className='log-'+(type||'inf');d.textContent=msg;var ll=document.getElementById('ll');ll.appendChild(d);ll.scrollTop=ll.scrollHeight;}
async function ai(system,user){var r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:system,user:user})});var d=await r.json();if(d.error)throw new Error(d.error);return d.text||'';}
async function postApps(payload){for(var i=0;i<3;i++){try{var r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'apps_script',payload:payload})});var rs=await r.json();if(rs.durum==='ok')return rs;if(i<2){lg('Yeniden deneniyor... ('+(i+1)+')');await new Promise(function(res){setTimeout(res,(i+1)*5000);});continue;}throw new Error(rs.mesaj||JSON.stringify(rs));}catch(e){if(i===2)throw e;await new Promise(function(res){setTimeout(res,3000);});}}throw new Error('Apps Script bağlanamadı');}
function pj(s){try{return JSON.parse(s);}catch(e){return null;}}
async function run(){
  if(running)return;
  var firma=document.getElementById('firma').value.trim();
  var inp=document.getElementById('inp').value.trim();
  if(!firma){alert('Firma adı girin!');return;}
  if(!inp){alert('Ürün/GTİP/Website girin!');return;}
  running=true;document.getElementById('btn').disabled=true;
  document.getElementById('lb').style.display='block';
  document.getElementById('ll').innerHTML='';
  document.getElementById('res').innerHTML='';
  ss(0);
  try{
    lg('GTİP belirleniyor...');
    var gtipSys='Sen bir dış ticaret uzmanısın. Sadece JSON döndür, başka hiçbir şey yazma.';
    var gtipUsr=mode==='g'?'GTİP kodu: '+inp+'\nJSON döndür: {"hs12":"'+inp+'","hs6":"'+inp.substring(0,6)+'","aciklama":"GTİP açıklaması"}':mode==='w'?'Website: '+inp+'\nAna ürününü analiz et, JSON döndür: {"hs12":"123456789012","hs6":"123456","aciklama":"ürün açıklaması"}':'Ürün: '+inp+'\nEn uygun GTİP kodunu belirle, JSON döndür: {"hs12":"123456789012","hs6":"123456","aciklama":"ürün açıklaması"}';
    var gtipRaw=await ai(gtipSys,gtipUsr);
    var gtipJson=pj(gtipRaw.replace(/```json|```/g,'').trim())||{hs12:'000000000000',hs6:'000000',aciklama:inp};
    lg('✅ GTİP: '+gtipJson.hs12+' - '+gtipJson.aciklama,'ok');ss(1);
    lg('Pazar verisi analiz ediliyor...');
    var pazarSys='Sen bir ihracat analisti uzmanısın. Sadece JSON döndür.';
    var pazarUsr='GTİP '+gtipJson.hs6+' ('+gtipJson.aciklama+') için Türkiye ihracat verilerini analiz et. JSON döndür: {"toplam":"$X.XXX.XXX.XXX USD","ulkeler":[["Ülke","$XXX.XXX.XXX","XX%"],...]} En az 10 ülke listele.';
    var pazarRaw=await ai(pazarSys,pazarUsr);
    var pazarJson=pj(pazarRaw.replace(/```json|```/g,'').trim())||{toplam:'Bilinmiyor',ulkeler:[]};
    lg('✅ '+pazarJson.ulkeler.length+' ülke, Toplam: '+pazarJson.toplam,'ok');ss(2);
    lg('Sektörler ve firmalar üretiliyor...');
    var icSys='Sen bir ihracat danışmanısın. Sadece JSON döndür.';
    var icUsr='GTİP '+gtipJson.hs6+' ('+gtipJson.aciklama+') için: 1. Bu ürünü ithal eden 5 sektör listele 2. 8 potansiyel alıcı firma listele. JSON döndür: {"sektorler":[["Sektör","Açıklama","Hacim"],...],"firmalar":[["Firma","Ülke","Sektör","Website","İletişim"],...]}';
    var icRaw=await ai(icSys,icUsr);
    var icJson=pj(icRaw.replace(/```json|```/g,'').trim())||{sektorler:[],firmalar:[]};
    lg('✅ '+icJson.sektorler.length+' sektör + '+icJson.firmalar.length+' firma','ok');ss(3);
    var dosyaAdi=firma.toUpperCase()+' - ON CALISMA';
    lg('"'+dosyaAdi+'" kaydediliyor...');
    var sonuc=await postApps({dosyaAdi:dosyaAdi,urunAdi:inp,gtip:gtipJson,toplam:pazarJson.toplam,ulkeler:pazarJson.ulkeler,sektorler:icJson.sektorler,firmalar:icJson.firmalar});
    ss(4);lg('✅ Drive\'a kaydedildi!','ok');
    var docUrl=sonuc.url||'';
    document.getElementById('res').innerHTML='<div class="res-card"><h2>✅ Rapor Hazır!</h2><div class="res-links">'+(docUrl?'<a class="link-doc" href="'+docUrl+'" target="_blank">📄 Belgeyi Aç</a>':'')+'<a class="link-folder" href="'+FOLDER_URL+'" target="_blank">📁 Klasörü Aç</a></div><div class="stats"><div class="stat"><div class="stat-val">'+gtipJson.hs12+'</div><div class="stat-lbl">GTİP Kodu</div></div><div class="stat"><div class="stat-val">'+pazarJson.ulkeler.length+'</div><div class="stat-lbl">Hedef Ülke</div></div><div class="stat"><div class="stat-val">'+pazarJson.toplam+'</div><div class="stat-lbl">Toplam İhracat</div></div><div class="stat"><div class="stat-val">'+icJson.firmalar.length+'</div><div class="stat-lbl">Potansiyel Alıcı</div></div></div>'+(pazarJson.ulkeler.length>0?'<h3 style="font-size:.85rem;color:#374151;margin-bottom:8px">🌍 En Büyük Pazarlar</h3><table><tr><th>#</th><th>Ülke</th><th>İhracat</th><th>Pay</th></tr>'+pazarJson.ulkeler.slice(0,5).map(function(u,i){return '<tr><td>'+(i+1)+'</td><td>'+u[0]+'</td><td>'+u[1]+'</td><td>'+u[2]+'</td></tr>';}).join('')+'</table>':'')+'</div>';
  }catch(err){lg('❌ '+err.message,'er');}
  finally{running=false;document.getElementById('btn').disabled=false;}
}
</script>
</body>
</html>
