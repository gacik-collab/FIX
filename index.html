<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FIX Consulting - İhracat Raporu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4ff;min-height:100vh}
.header{background:linear-gradient(135deg,#1a3a8f,#2563eb);color:#fff;padding:20px 30px}
.header h1{font-size:1.5rem;font-weight:700}
.header p{font-size:.85rem;opacity:.8;margin-top:4px}
.steps{display:flex;gap:0;background:#fff;border-bottom:1px solid #e5e7eb;padding:0 30px;overflow-x:auto}
.step{padding:12px 20px;font-size:.8rem;color:#9ca3af;display:flex;align-items:center;gap:6px;white-space:nowrap;border-bottom:2px solid transparent}
.step.on{color:#2563eb;border-bottom-color:#2563eb;font-weight:600}
.step.done{color:#16a34a}
.step.err{color:#dc2626}
.main{max-width:700px;margin:40px auto;padding:0 20px}
.card{background:#fff;border-radius:16px;padding:36px;box-shadow:0 2px 16px rgba(0,0,0,.08)}
label{display:block;font-size:.8rem;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.hint{font-size:.75rem;color:#6b7280;margin-top:4px;margin-bottom:16px}
input[type=text]{width:100%;padding:12px 16px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.95rem;outline:none;transition:border .2s}
input[type=text]:focus{border-color:#2563eb}
.tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:8px 16px;border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;cursor:pointer;font-size:.82rem;color:#374151;transition:all .2s}
.tab.on{background:#2563eb;color:#fff;border-color:#2563eb}
.sep{height:1px;background:#f3f4f6;margin:24px 0}
button#btn{width:100%;padding:16px;background:linear-gradient(135deg,#1a3a8f,#2563eb);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:24px}
button#btn:disabled{opacity:.6;cursor:not-allowed}
#lb{display:none;margin-top:24px;background:#f8faff;border:1px solid #dbeafe;border-radius:12px;padding:16px}
#lb h3{font-size:.85rem;color:#1e40af;margin-bottom:10px}
#ll{max-height:200px;overflow-y:auto;font-size:.8rem;font-family:monospace}
.log-ok{color:#16a34a}.log-er{color:#dc2626}.log-inf{color:#374151}
#res{margin-top:24px}
.res-card{background:#fff;border:1px solid #d1fae5;border-radius:12px;padding:24px}
.res-card h2{color:#065f46;margin-bottom:16px}
.res-links{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.res-links a{padding:10px 20px;border-radius:8px;text-decoration:none;font-size:.85rem;font-weight:600}
.link-doc{background:#2563eb;color:#fff}
.link-folder{background:#e0f2fe;color:#0369a1}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat{background:#f0f9ff;border-radius:10px;padding:16px;text-align:center}
.stat-val{font-size:1.1rem;font-weight:700;color:#1e40af}
.stat-lbl{font-size:.72rem;color:#64748b;margin-top:4px;text-transform:uppercase}
table{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:10px}
th{background:#f1f5f9;padding:8px 12px;text-align:left;color:#475569;font-weight:600}
td{padding:8px 12px;border-bottom:1px solid #f1f5f9;color:#374151}
tr:hover td{background:#f8faff}
</style>
</head>
<body>
<div class="header">
  <h1>FIX Consulting — Otomatik İhracat Raporu</h1>
  <p>Firma Adı + Ürün/GTİP → Gerçek Veri Analizi → Drive</p>
</div>
<div class="steps">
  <div class="step" id="s0">🔍 GTİP</div>
  <div class="step" id="s1">📊 Trademap</div>
  <div class="step" id="s2">🎯 Sektörler</div>
  <div class="step" id="s3">🏢 Müşteriler</div>
  <div class="step" id="s4">☁️ Drive</div>
  <div class="step" id="s5">✅ Hazır</div>
</div>
<div class="main">
  <div class="card">
    <label>🏢 Müşteri / Firma Adı</label>
    <input type="text" id="firma" placeholder="örnek: Arçelik, CMK Kağıt, ABC Ltd...">
    <p class="hint">Dosya adı: <strong>FİRMA ADI - ON CALISMA</strong> olarak kaydedilir</p>
    <div class="sep"></div>
    <label>📦 Ürün Adı / 12 Haneli GTİP / Website</label>
    <div class="tabs">
      <button class="tab on" id="t-u" onclick="setTab('u')">🏭 Ürün Adı</button>
      <button class="tab" id="t-g" onclick="setTab('g')">🔢 GTİP (12 hane)</button>
      <button class="tab" id="t-w" onclick="setTab('w')">🌐 Web Sitesi</button>
    </div>
    <input type="text" id="inp" placeholder="dökme demir tava, çelik boru...">
    <button id="btn" onclick="run()">🚀 Raporu Otomatik Hazırla</button>
  </div>
  <div id="lb"><h3>⏳ İşlem Durumu</h3><div id="ll"></div></div>
  <div id="res"></div>
</div>
<script>
var FOLDER_URL='https://drive.google.com/drive/folders/1WaBrSm7Ey3WUq3K3foRITFiuKdzltwer';
var mode='u',running=false;
function setTab(m){mode=m;['u','g','w'].forEach(function(x){document.getElementById('t-'+x).className='tab'+(x===m?' on':'');});var ph={u:'dökme demir tava, çelik boru...',g:'940320000000 (12 haneli GTİP)',w:'www.firmam.com...'};document.getElementById('inp').placeholder=ph[m];}
function ss(n){for(var i=0;i<6;i++){var e=document.getElementById('s'+i);e.className='step'+(i<n?' done':i===n?' on':'');}}
function lg(msg,type){var d=document.createElement('div');d.className='log-'+(type||'inf');d.textContent=msg;var ll=document.getElementById('ll');ll.appendChild(d);ll.scrollTop=ll.scrollHeight;}
function pj(s){try{var c=s.replace(/```json|```/g,'').trim();var m=c.match(/{[sS]*}/);return m?JSON.parse(m[0]):null;}catch(e){return null;}}
function safeArr(o,k){if(!o)return[];var keys=k?[k]:Object.keys(o);for(var i=0;i<keys.length;i++){if(Array.isArray(o[keys[i]]))return o[keys[i]];}return[];}
async function ai(s,u){
  var r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:s,user:u})});
  var d=await r.json();if(d.error)throw new Error(d.error);return d.text||'';
}
async function postApps(p){
  for(var i=0;i<3;i++){
    try{
      var r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'apps_script',payload:p})});
      var rs=await r.json();
      if(rs.durum==='ok')return rs;
      if(i<2){lg('Yeniden deneniyor... ('+(i+1)+')');await new Promise(function(x){setTimeout(x,(i+1)*5000);});continue;}
      throw new Error(rs.mesaj||JSON.stringify(rs));
    }catch(e){if(i===2)throw e;await new Promise(function(x){setTimeout(x,3000);});}
  }
}
async function run(){
  if(running)return;
  var firma=document.getElementById('firma').value.trim();
  var inp=document.getElementById('inp').value.trim();
  if(!firma){alert('Firma adı girin!');return;}
  if(!inp){alert('Ürün/GTİP/Website girin!');return;}
  running=true;
  document.getElementById('btn').disabled=true;
  document.getElementById('lb').style.display='block';
  document.getElementById('ll').innerHTML='';
  document.getElementById('res').innerHTML='';
  ss(0);
  try{
    lg('🔍 GTİP belirleniyor...');
    var gSys='Sen bir dış ticaret uzmanısın. SADECE JSON döndür, başka hiçbir şey yazma. JSON formatı: {"hs12":"123456789012","hs6":"123456","hs4":"1234","aciklama":"Urun aciklamasi Turkce","kategori":"Urun kategorisi"}';
    var gUsr;
    if(mode==='g'){
      gUsr='Bu 12 haneli GTİP kodu verildi: '+inp+'. Sadece bu kodu kullanarak JSON döndür: {"hs12":"'+inp+'","hs6":"'+inp.substring(0,6)+'","hs4":"'+inp.substring(0,4)+'","aciklama":"GTİP aciklamasi yaz","kategori":"kategori yaz"}';
    } else if(mode==='w'){
      gUsr='Bu firmayı analiz et: '+inp+'. Firmanın ana ihracat ürününü belirle ve en uygun 12 haneli GTİP kodunu bul. JSON döndür.';
    } else {
      gUsr='Ürün: "'+inp+'". Bu ürün için en uygun 12 haneli GTİP kodunu belirle. Örnek: "avize" için 9405200000 degil tam 12 haneli kod kullan. JSON döndür.';
    }
    var gRaw=await ai(gSys,gUsr);
    var gJson=pj(gRaw)||{hs12:'000000000000',hs6:'000000',hs4:'0000',aciklama:inp,kategori:inp};
    if(!gJson.hs6||gJson.hs6==='000000')gJson.hs6=gJson.hs12.substring(0,6);
    lg('✅ GTİP: '+gJson.hs12+' - '+gJson.aciklama,'ok');
    ss(1);
    lg('📊 Trademap verisi aranıyor...');
    var tSys='Sen bir dış ticaret veri analisti ve arastirmacissin. Web arama yapabilirsin. SADECE JSON döndür.';
    var tUsr='GTİP kodu '+gJson.hs6+' (12 haneli: '+gJson.hs12+') - '+gJson.aciklama+' urunu icin 2024 yili Turkiye ihracat verilerini web'den ara. Trademap, TIM (Turkiye Ihracatcilar Meclisi), TUIK, veya resmi kaynaklardan veri bul. ONEMLI: Trademap'te rakamlar 1000 USD birimindedir, 1000 ile carp. JSON: {"toplam":"$X.XXX.XXX.XXX USD","yil":"2024","ulkeler":[["Ulke Adi","$XXX.XXX.XXX USD","XX.X%"],["Ulke2","$XX.XXX.XXX USD","X.X%"],...]} En az 10 ulke yaz. Rakamlar gercek olmali.';
    var tRaw=await ai(tSys,tUsr);
    var tObj=pj(tRaw)||{};
    var pUlk=Array.isArray(tObj.ulkeler)?tObj.ulkeler:safeArr(tObj,'ulkeler')||safeArr(tObj,'countries')||[];
    var pTop=tObj.toplam||tObj.total||'Hesaplanamadı';
    lg('✅ '+pUlk.length+' ülke verisi, Toplam: '+pTop,'ok');
    ss(2);
    lg('🎯 Hedeflenebilecek sektörler belirleniyor...');
    var sSys='ihracat, dis ticaret ve B2B hedef musteri belirleme konusunda uzman bir danismansin. SADECE JSON dondurmalisin.';
    var sUsr='Urun: '+gJson.aciklama+' (GTIP: '+gJson.hs12+'). Bu urun icin "IHRACATTA HEDEFLENEBİLECEK SEKTORLER" tablosunu olustur. KURALLAR: 1) Tam olarak 2 kolon: "sektor" ve "aciklama" 2) Mutlaka urun ozeline gore bir "Distributor" sektoru ekle (distributor kelimesini sade sekilde kullan) 3) Siralalama veya onceliklendirme yapma 4) Sektor adlari net ve tekrar etmesin 5) Minimum 6 maksimum 8 sektor 6) Turkce yaz. JSON: {"sektorler":[{"sektor":"Sektor Adi","aciklama":"Bu sektorde nasil kullanilir veya neden uygundur"},...]}';
    var sRaw=await ai(sSys,sUsr);
    var sObj=pj(sRaw)||{};
    var sektorler=Array.isArray(sObj.sektorler)?sObj.sektorler:[];
    lg('✅ '+sektorler.length+' sektör belirlendi','ok');
    ss(3);
    lg('🏢 Potansiyel müşteri arastirması yapılıyor...');
    var mSys='Sen bir ihracat danismani ve ticaret arastirmacisissin. Gercek firmalar bulman gerekiyor. SADECE JSON dondurmalisin.';
    var mUsr='Urun: '+gJson.aciklama+' (GTIP: '+gJson.hs6+'). Bu urunu ithal eden veya satın alan GERCEK firmalari bul. Ticaret sicilleri, import kayitlari, sektoreL directory'ler veya web kaynaklarindan arastir. Her firma icin: firma adi, ulkesi, sektoru ve websitesi (biliyorsan) yaz. Websiteni bilmiyorsan bos bırak. Minimum 8 maksimum 10 firma. ONEMLI: Uydurma firma adi yazma, sadece gercek veya gercege yakin firmalari yaz. JSON: {"firmalar":[{"firma":"Gercek Firma Adi","ulke":"Ulke","sektor":"Sektor","website":"www.firma.com veya bos"},...]}';
    var mRaw=await ai(mSys,mUsr);
    var mObj=pj(mRaw)||{};
    var firmalar=Array.isArray(mObj.firmalar)?mObj.firmalar:[];
    lg('✅ '+firmalar.length+' potansiyel müşteri bulundu','ok');
    ss(4);
    var dosyaAdi=firma.toUpperCase()+' - ON CALISMA';
    lg('"'+dosyaAdi+'" Drive''a kaydediliyor...');
    var ulkelerArr=pUlk.map(function(u){return Array.isArray(u)?u:[u.ulke||u.country||'',u.hacim||u.value||'',u.pay||u.share||'']; });
    var sektorlerArr=sektorler.map(function(s){return[s.sektor||s.name||'',s.aciklama||s.description||'']; });
    var firmalarArr=firmalar.map(function(f){return[f.firma||f.name||'',f.ulke||f.country||'',f.sektor||f.sector||'',f.website||'']; });
    var sonuc=await postApps({
      dosyaAdi:dosyaAdi,
      urunAdi:inp,
      gtip:{hs12:gJson.hs12,hs6:gJson.hs6,aciklama:gJson.aciklama},
      toplam:pTop,
      ulkeler:ulkelerArr,
      sektorler:sektorlerArr,
      firmalar:firmalarArr
    });
    ss(5);
    lg('✅ Drive''a kaydedildi!','ok');
    var docUrl=sonuc.url||'';
    var html='<div class="res-card"><h2>✅ Rapor Hazır!</h2>';
    html+='<div class="res-links">';
    if(docUrl)html+='<a class="link-doc" href="'+docUrl+'" target="_blank">📄 Belgeyi Aç</a>';
    html+='<a class="link-folder" href="'+FOLDER_URL+'" target="_blank">📁 Klasörü Aç</a>';
    html+='</div><div class="stats">';
    html+='<div class="stat"><div class="stat-val">'+gJson.hs12+'</div><div class="stat-lbl">GTİP Kodu</div></div>';
    html+='<div class="stat"><div class="stat-val">'+ulkelerArr.length+'</div><div class="stat-lbl">Hedef Ülke</div></div>';
    html+='<div class="stat"><div class="stat-val">'+pTop+'</div><div class="stat-lbl">Toplam İhracat</div></div>';
    html+='<div class="stat"><div class="stat-val">'+firmalarArr.length+'</div><div class="stat-lbl">Potansiyel Firma</div></div>';
    html+='</div>';
    if(ulkelerArr.length>0){
      html+='<h3 style="font-size:.85rem;color:#374151;margin:16px 0 8px">🌍 En Büyük İhracat Pazarları (Trademap 2024)</h3>';
      html+='<table><tr><th>#</th><th>Ülke</th><th>İhracat</th><th>Pay</th></tr>';
      ulkelerArr.slice(0,10).forEach(function(u,i){html+='<tr><td>'+(i+1)+'</td><td>'+(u[0]||'')+'</td><td>'+(u[1]||'')+'</td><td>'+(u[2]||'')+'</td></tr>';});
      html+='</table>';
    }
    html+='</div>';
    document.getElementById('res').innerHTML=html;
  }catch(err){
    lg('❌ '+err.message,'er');
  }finally{
    running=false;
    document.getElementById('btn').disabled=false;
  }
}
</script>
</body>
</html>
